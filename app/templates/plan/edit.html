{% extends "base.html" %}
{% block title %}Edit Plan - Gatekeeper{% endblock %}
{% block content %}
<a href="/plan/{{ plan.id }}" class="back-link">&larr; Back to Plan</a>
<h2>Edit Trading Plan</h2>

<form method="post" action="/plan/{{ plan.id }}/edit">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="name">Plan Name</label>
    <input type="text" id="name" name="name" value="{{ plan.name or '' }}" required>

    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4">{{ plan.description or '' }}</textarea>

    <button type="submit">Save</button>
</form>
{% endblock %}

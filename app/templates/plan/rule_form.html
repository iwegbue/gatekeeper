{% extends "base.html" %}
{% block title %}{% if rule %}Edit Rule{% else %}New Rule{% endif %} - Gatekeeper{% endblock %}
{% block content %}
<a href="/plan/{{ plan.id }}" class="back-link">&larr; Back to Plan</a>
<h2>{% if rule %}Edit Rule{% else %}New Rule{% endif %}</h2>

<form method="post" action="{% if rule %}/plan/{{ plan.id }}/rules/{{ rule.id }}/edit{% else %}/plan/{{ plan.id }}/rules/new{% endif %}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="layer"><span class="tip-trigger-text">Layer<span class="tip-content">Which of the 7 gates this rule belongs to: CONTEXT → SETUP → CONFIRMATION → ENTRY → RISK → MANAGEMENT → BEHAVIORAL. Ideas must pass each layer in order.</span></span></label>
    <select id="layer" name="layer" required>
        {% for l in layers %}
        <option value="{{ l.value }}" {% if (rule and rule.layer == l.value) or (not rule and layer == l.value) %}selected{% endif %}>{{ l.value }}</option>
        {% endfor %}
    </select>

    <label for="name">Rule Name</label>
    <input type="text" id="name" name="name" value="{{ rule.name if rule else '' }}" required placeholder="e.g., Price is above 200 SMA">

    <label for="description">Description (optional)</label>
    <textarea id="description" name="description" rows="3" placeholder="Detailed criteria for this rule...">{{ rule.description if rule else '' }}</textarea>

    <div class="grid">
        <div>
            <label for="rule_type"><span class="tip-trigger-text">Type<span class="tip-content"><strong>REQUIRED</strong> — must be checked before you can advance. Blocking.<br><strong>OPTIONAL</strong> — not required to advance, but earns points toward your grade. Skipping lowers your score.<br><strong>ADVISORY</strong> — reminder only. Has no effect on grade or advancement. Use for habits you want to build.</span></span></label>
            <select id="rule_type" name="rule_type">
                {% for rt in rule_types %}
                <option value="{{ rt.value }}" {% if rule and rule.rule_type == rt.value %}selected{% endif %}>{{ rt.value }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="weight"><span class="tip-trigger-text">Weight<span class="tip-content">How many points this rule contributes to your checklist score. Choose <strong>1</strong> for nice-to-have criteria, <strong>2</strong> for important conditions, <strong>3</strong> for critical non-negotiables that aren't already marked Required. Only applies to Required and Optional rules.</span></span></label>
            <input type="number" id="weight" name="weight" value="{{ rule.weight if rule else 1 }}" min="0" max="10">
        </div>
    </div>

    {% if rule %}
    <label>
        <input type="checkbox" name="is_active" value="true" {% if rule.is_active %}checked{% endif %}>
        <span class="tip-trigger-text">Active<span class="tip-content">When checked, this rule appears in idea checklists and counts toward scores. Uncheck to retire a rule without deleting it.</span></span>
    </label>
    {% endif %}

    <button type="submit">{% if rule %}Update{% else %}Create{% endif %} Rule</button>
</form>

{% if rule %}
<form method="post" action="/plan/{{ plan.id }}/rules/{{ rule.id }}/delete" style="margin-top: 1rem;"
      onsubmit="return confirm('Delete this rule?');">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit" class="btn-danger small">Delete Rule</button>
</form>
{% endif %}
{% endblock %}

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Gatekeeper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container" style="max-width: 420px; margin-top: 10vh;">
        <article>
            <hgroup>
                <h2>Gatekeeper</h2>
                <p>Welcome — let's set your admin password to get started.</p>
            </hgroup>
            {% if error %}
            <p style="color: var(--pico-color-red-500);">{{ error }}</p>
            {% endif %}
            <form method="post" action="/setup">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label for="password">Admin password</label>
                <input type="password" id="password" name="password" required autofocus
                       minlength="8" placeholder="At least 8 characters">
                <label for="password_confirm">Confirm password</label>
                <input type="password" id="password_confirm" name="password_confirm" required
                       minlength="8" placeholder="Repeat password">
                <button type="submit">Set password &amp; continue</button>
            </form>
            <small style="color: var(--pico-color-zinc-400);">
                This password protects your Gatekeeper instance. Store it somewhere safe.
            </small>
        </article>
    </main>
</body>
</html>

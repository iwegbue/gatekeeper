# Pre-built app image — for contributors building from source, use the repo-root docker-compose.yml.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gatekeeper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gatekeeper}
      POSTGRES_DB: gatekeeper
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${GATEKEEPER_IMAGE:-ghcr.io/iwegbue/gatekeeper:latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://gatekeeper:${POSTGRES_PASSWORD:-gatekeeper}@db:5432/gatekeeper
      SECRET_KEY: ${SECRET_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
    volumes:
      - appdata:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/setup')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  appdata:

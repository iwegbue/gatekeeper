name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gatekeeper
          POSTGRES_PASSWORD: gatekeeper
          POSTGRES_DB: gatekeeper_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://gatekeeper:gatekeeper@localhost:5432/gatekeeper_test
      DATABASE_URL: postgresql+asyncpg://gatekeeper:gatekeeper@localhost:5432/gatekeeper_test
      SECRET_KEY: test-secret-key
      ADMIN_PASSWORD: admin

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=app/services --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

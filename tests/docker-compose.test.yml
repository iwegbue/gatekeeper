services:
  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gatekeeper
      POSTGRES_PASSWORD: gatekeeper
      POSTGRES_DB: gatekeeper_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeeper"]
      interval: 3s
      timeout: 5s
      retries: 10
